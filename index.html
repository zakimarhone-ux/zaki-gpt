<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مصاريفي</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="مصاريفي">
</head>

<body>

<div class="container">

<h1>💰 مصاريفي</h1>

<div class="card">
<h2>الرصيد الشخصي</h2>
<input id="balance" type="number" placeholder="أدخل الرصيد">
<button onclick="saveBalance()">حفظ الرصيد</button>
</div>

<div class="card">
<h2>إضافة مصروف</h2>

<input id="date" type="date">

<input id="title" type="text" placeholder="البيان">

<input id="amount" type="number" placeholder="المبلغ">

<button onclick="addExpense()">إضافة</button>
</div>

<div class="card">

<h2>الرصيد المتبقي</h2>

<h1 id="remaining">0 دج</h1>

</div>

<div class="card">

<h2>المصاريف</h2>

<div id="expenses"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
